version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.11
    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-cache-{{ checksum "package-lock.json" }}
            - npm-cache-

      - run:
          name: Install dependencies
          command: npm install

      - save_cache:
          paths:
            - ~/.npm
          key: npm-cache-{{ checksum "package-lock.json" }}

      - run:
          name: Run tests
          command: npm test

workflows:
  build-and-test:
    jobs:
      - build